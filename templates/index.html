<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Summary 解析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Amazon Seller Central</p>
      <h1>Summary 压缩包一键解析</h1>
      <p class="intro">上传一个包含全部 PDF 的 <code>zip</code> 或 <code>rar</code> 压缩包，系统会自动解压、解析、生成 Excel，并在页面上展示处理进度和失败明细。</p>
    </section>

    <section class="panel">
      <form id="upload-form" class="upload-form">
        <div class="upload-grid">
          <label id="upload-box" class="upload-box" for="archive">
            <input id="archive" name="archive" type="file" accept=".zip,.rar">
            <span id="upload-title" class="upload-title">选择压缩包</span>
            <span id="upload-subtitle" class="upload-subtitle">支持 zip / rar，建议把所有 PDF 放在同一个压缩包里</span>
          </label>

          <label id="pdf-upload-box" class="upload-box" for="pdf-files">
            <input id="pdf-files" name="pdf_files" type="file" accept=".pdf" multiple>
            <span id="pdf-upload-title" class="upload-title">直接选择多个 PDF</span>
            <span id="pdf-upload-subtitle" class="upload-subtitle">支持一次选择多个 PDF 文件，无需先压缩</span>
          </label>
        </div>

        <div id="selected-file" class="selected-file hidden">
          <span>已选择压缩包</span>
          <strong id="selected-file-name">-</strong>
          <small id="selected-file-meta">-</small>
        </div>
        <div id="selected-pdfs" class="selected-file hidden">
          <span>已选择 PDF 文件</span>
          <strong id="selected-pdfs-name">-</strong>
          <small id="selected-pdfs-meta">-</small>
        </div>
        <button id="submit-btn" class="submit-btn" type="submit">开始解析</button>
      </form>
    </section>

    <section id="status-panel" class="panel hidden">
      <div class="status-header">
        <div>
          <p class="eyebrow">处理进度</p>
          <h2 id="status-title">等待开始</h2>
          <p id="status-message" class="status-message"></p>
        </div>
        <div id="badge" class="badge">待处理</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text" class="progress-text">0 / 0</div>
      </div>

      <div class="stats-grid">
        <article class="stat-card">
          <span>总文件数</span>
          <strong id="total-files">0</strong>
        </article>
        <article class="stat-card">
          <span>成功文件数</span>
          <strong id="success-count">0</strong>
        </article>
        <article class="stat-card">
          <span>失败文件数</span>
          <strong id="failure-count">0</strong>
        </article>
        <article class="stat-card">
          <span>已跳过文件数</span>
          <strong id="skipped-count">0</strong>
        </article>
        <article class="stat-card">
          <span>输出数据行</span>
          <strong id="total-rows">0</strong>
        </article>
      </div>

      <div class="scope-note">
        `MX` 和 `BR` 站点数据不在当前统计范围内，系统会自动跳过，不计入失败。
      </div>

      <div class="current-file-box">
        <span>当前文件</span>
        <strong id="current-file">-</strong>
      </div>

      <div id="download-wrap" class="download-wrap hidden">
        <a id="download-link" class="download-btn" href="#">下载 Excel</a>
      </div>
    </section>

    <section id="errors-panel" class="panel hidden">
      <div class="section-head">
        <div>
          <p class="eyebrow">失败详情</p>
          <h2>错误列表</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>文件名</th>
              <th>阶段</th>
              <th>原因</th>
            </tr>
          </thead>
          <tbody id="errors-body"></tbody>
        </table>
      </div>
    </section>

    <section id="history-panel" class="panel hidden">
      <div class="section-head">
        <div>
          <p class="eyebrow">最近任务</p>
          <h2>任务历史</h2>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById('upload-form');
    const archiveInput = document.getElementById('archive');
    const pdfFilesInput = document.getElementById('pdf-files');
    const uploadBox = document.getElementById('upload-box');
    const uploadTitle = document.getElementById('upload-title');
    const uploadSubtitle = document.getElementById('upload-subtitle');
    const pdfUploadBox = document.getElementById('pdf-upload-box');
    const pdfUploadTitle = document.getElementById('pdf-upload-title');
    const pdfUploadSubtitle = document.getElementById('pdf-upload-subtitle');
    const submitBtn = document.getElementById('submit-btn');
    const selectedFile = document.getElementById('selected-file');
    const selectedFileName = document.getElementById('selected-file-name');
    const selectedFileMeta = document.getElementById('selected-file-meta');
    const selectedPdfs = document.getElementById('selected-pdfs');
    const selectedPdfsName = document.getElementById('selected-pdfs-name');
    const selectedPdfsMeta = document.getElementById('selected-pdfs-meta');
    const statusPanel = document.getElementById('status-panel');
    const errorsPanel = document.getElementById('errors-panel');
    const statusTitle = document.getElementById('status-title');
    const statusMessage = document.getElementById('status-message');
    const badge = document.getElementById('badge');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const totalFiles = document.getElementById('total-files');
    const successCount = document.getElementById('success-count');
    const failureCount = document.getElementById('failure-count');
    const skippedCount = document.getElementById('skipped-count');
    const totalRows = document.getElementById('total-rows');
    const currentFile = document.getElementById('current-file');
    const errorsBody = document.getElementById('errors-body');
    const downloadWrap = document.getElementById('download-wrap');
    const downloadLink = document.getElementById('download-link');
    const historyPanel = document.getElementById('history-panel');
    const historyList = document.getElementById('history-list');
    const JOB_STORAGE_KEY = 'summaryAmazonPdfCurrentJobId';

    let timer = null;
    let currentJobId = null;

    function formatSize(size) {
      if (!size && size !== 0) return '-';
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      if (size < 1024 * 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)} MB`;
      return `${(size / 1024 / 1024 / 1024).toFixed(1)} GB`;
    }

    function renderSelectedFile(file) {
      if (!file) {
        selectedFile.classList.add('hidden');
        uploadBox.classList.remove('has-file');
        uploadTitle.textContent = '选择压缩包';
        uploadSubtitle.textContent = '支持 zip / rar，建议把所有 PDF 放在同一个压缩包里';
        return;
      }

      selectedFile.classList.remove('hidden');
      uploadBox.classList.add('has-file');
      uploadTitle.textContent = '压缩包已选中';
      uploadSubtitle.textContent = '确认无误后点击下方“开始解析”即可上传处理';
      selectedFileName.textContent = file.name;
      selectedFileMeta.textContent = `${formatSize(file.size)} · ${file.type || 'archive file'}`;
    }

    function renderSelectedPdfs(files) {
      if (!files || files.length === 0) {
        selectedPdfs.classList.add('hidden');
        pdfUploadBox.classList.remove('has-file');
        pdfUploadTitle.textContent = '直接选择多个 PDF';
        pdfUploadSubtitle.textContent = '支持一次选择多个 PDF 文件，无需先压缩';
        return;
      }

      const totalSize = files.reduce((sum, file) => sum + (file.size || 0), 0);
      selectedPdfs.classList.remove('hidden');
      pdfUploadBox.classList.add('has-file');
      pdfUploadTitle.textContent = 'PDF 文件已选中';
      pdfUploadSubtitle.textContent = '确认无误后点击下方“开始解析”即可上传处理';
      selectedPdfsName.textContent = `共 ${files.length} 个 PDF 文件`;
      selectedPdfsMeta.textContent = `${formatSize(totalSize)} · ${files.slice(0, 3).map(file => file.name).join('，')}${files.length > 3 ? ' 等' : ''}`;
    }

    function saveCurrentJobId(jobId) {
      currentJobId = jobId || null;
      if (jobId) {
        localStorage.setItem(JOB_STORAGE_KEY, jobId);
        const url = new URL(window.location.href);
        url.searchParams.set('job', jobId);
        window.history.replaceState({}, '', url);
      } else {
        localStorage.removeItem(JOB_STORAGE_KEY);
        const url = new URL(window.location.href);
        url.searchParams.delete('job');
        window.history.replaceState({}, '', url);
      }
    }

    function loadSavedJobId() {
      const url = new URL(window.location.href);
      return url.searchParams.get('job') || localStorage.getItem(JOB_STORAGE_KEY) || '';
    }

    async function findLatestServerJob() {
      try {
        const response = await fetch('/api/jobs?limit=10');
        const payload = await response.json();
        if (!response.ok) {
          return '';
        }

        const jobs = payload.jobs || [];
        const activeJob = jobs.find(job => job.stage !== 'completed' && job.stage !== 'failed');
        if (activeJob) {
          return activeJob.job_id;
        }
        if (jobs.length > 0) {
          return jobs[0].job_id;
        }
        return '';
      } catch (error) {
        return '';
      }
    }

    function setBadge(stage) {
      const stageMap = {
        queued: ['待处理', 'queued'],
        extracting: ['解压中', 'extracting'],
        processing: ['解析中', 'processing'],
        completed: ['已完成', 'completed'],
        failed: ['失败', 'failed'],
      };
      const [text, cls] = stageMap[stage] || ['处理中', 'processing'];
      badge.textContent = text;
      badge.className = `badge ${cls}`;
    }

    function renderErrors(errors) {
      if (!errors || errors.length === 0) {
        errorsPanel.classList.add('hidden');
        errorsBody.innerHTML = '';
        return;
      }

      errorsPanel.classList.remove('hidden');
      errorsBody.innerHTML = errors.map(item => `
        <tr>
          <td>${item['文件名'] || '-'}</td>
          <td>${item['阶段'] || '-'}</td>
          <td>${item['原因'] || '-'}</td>
        </tr>
      `).join('');
    }

    function formatTime(timestamp) {
      if (!timestamp) return '-';
      try {
        return new Date(timestamp * 1000).toLocaleString('zh-CN', { hour12: false });
      } catch (error) {
        return '-';
      }
    }

    function renderHistory(jobs) {
      if (!jobs || jobs.length === 0) {
        historyPanel.classList.add('hidden');
        historyList.innerHTML = '';
        return;
      }

      historyPanel.classList.remove('hidden');
      historyList.innerHTML = jobs.map(job => {
        const active = currentJobId === job.job_id ? 'active' : '';
        return `
          <button class="history-item ${active}" type="button" data-job-id="${job.job_id}">
            <div class="history-main">
              <strong>${job.filename || job.job_id}</strong>
              <span>${formatTime(job.created_at)}</span>
            </div>
            <div class="history-meta">
              <span>状态：${job.stage || '-'}</span>
              <span>成功：${job.success_count || 0}</span>
              <span>失败：${job.failure_count || 0}</span>
              <span>跳过：${job.skipped_count || 0}</span>
            </div>
          </button>
        `;
      }).join('');

      historyList.querySelectorAll('[data-job-id]').forEach((item) => {
        item.addEventListener('click', () => {
          const jobId = item.getAttribute('data-job-id');
          if (!jobId) return;
          submitBtn.disabled = true;
          renderJob({
            stage: 'queued',
            message: '正在打开所选任务',
            total_files: 0,
            processed_files: 0,
            success_count: 0,
            failure_count: 0,
            skipped_count: 0,
            total_rows: 0,
            current_file: '',
            errors: [],
          });
          pollJob(jobId);
        });
      });
    }

    async function refreshHistory() {
      try {
        const response = await fetch('/api/jobs?limit=8');
        const payload = await response.json();
        if (!response.ok) {
          return [];
        }
        const jobs = payload.jobs || [];
        renderHistory(jobs);
        return jobs;
      } catch (error) {
        return [];
      }
    }

    function renderJob(job) {
      statusPanel.classList.remove('hidden');
      statusTitle.textContent = {
        queued: '任务已创建',
        extracting: '正在解压压缩包',
        processing: '正在解析 PDF',
        completed: '解析完成',
        failed: '任务失败',
      }[job.stage] || '处理中';
      statusMessage.textContent = job.message || '';
      setBadge(job.stage);

      const processed = job.processed_files || 0;
      const total = job.total_files || 0;
      const percent = total > 0 ? Math.round((processed / total) * 100) : (job.stage === 'completed' ? 100 : 0);
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${processed} / ${total}`;
      totalFiles.textContent = total;
      successCount.textContent = job.success_count || 0;
      failureCount.textContent = job.failure_count || 0;
      skippedCount.textContent = job.skipped_count || 0;
      totalRows.textContent = job.total_rows || 0;
      currentFile.textContent = job.current_file || '-';

      renderErrors(job.errors || []);

      if (job.stage === 'completed' && job.download_url) {
        downloadWrap.classList.remove('hidden');
        downloadLink.href = job.download_url;
      } else {
        downloadWrap.classList.add('hidden');
      }
    }

    async function pollJob(jobId) {
      if (timer) {
        clearTimeout(timer);
      }

      saveCurrentJobId(jobId);

      try {
        const response = await fetch(`/api/jobs/${jobId}`);
        const job = await response.json();
        if (!response.ok) {
          throw new Error(job.error || '获取任务状态失败');
        }

        renderJob(job);
        refreshHistory();

        if (job.stage !== 'completed' && job.stage !== 'failed') {
          timer = setTimeout(() => pollJob(jobId), 1000);
        } else {
          submitBtn.disabled = false;
          saveCurrentJobId(jobId);
        }
      } catch (error) {
        statusPanel.classList.remove('hidden');
        statusTitle.textContent = '状态获取失败';
        statusMessage.textContent = error.message;
        setBadge('failed');
        submitBtn.disabled = false;
        if (String(error.message || '').includes('任务不存在')) {
          saveCurrentJobId('');
        }
      }
    }

    archiveInput.addEventListener('change', () => {
      const file = archiveInput.files && archiveInput.files[0];
      if (file) {
        pdfFilesInput.value = '';
        renderSelectedPdfs([]);
      }
      renderSelectedFile(file || null);
    });

    pdfFilesInput.addEventListener('change', () => {
      const files = Array.from(pdfFilesInput.files || []);
      if (files.length > 0) {
        archiveInput.value = '';
        renderSelectedFile(null);
      }
      renderSelectedPdfs(files);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!archiveInput.files.length && !(pdfFilesInput.files && pdfFilesInput.files.length)) {
        alert('请先选择 zip/rar 压缩包，或直接选择多个 PDF 文件');
        return;
      }

      submitBtn.disabled = true;
      downloadWrap.classList.add('hidden');
      errorsPanel.classList.add('hidden');
      errorsBody.innerHTML = '';
      renderJob({
        stage: 'queued',
        message: '文件上传中',
        total_files: 0,
        processed_files: 0,
        success_count: 0,
        failure_count: 0,
        skipped_count: 0,
        total_rows: 0,
        current_file: '',
        errors: [],
      });

      const formData = new FormData();
      if (archiveInput.files.length) {
        formData.append('archive', archiveInput.files[0]);
      } else {
        Array.from(pdfFilesInput.files || []).forEach((file) => {
          formData.append('pdf_files', file);
        });
      }

      try {
        const response = await fetch('/api/jobs', {
          method: 'POST',
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || '上传失败');
        }
        saveCurrentJobId(payload.job_id);
        refreshHistory();
        pollJob(payload.job_id);
      } catch (error) {
        submitBtn.disabled = false;
        statusTitle.textContent = '上传失败';
        statusMessage.textContent = error.message;
        setBadge('failed');
      }
    });

    window.addEventListener('load', async () => {
      const jobs = await refreshHistory();
      let savedJobId = loadSavedJobId();
      if (!savedJobId) {
        savedJobId = (jobs.find(job => job.stage !== 'completed' && job.stage !== 'failed') || jobs[0] || {}).job_id || '';
      }
      if (!savedJobId) {
        savedJobId = await findLatestServerJob();
      }
      if (!savedJobId) {
        return;
      }

      submitBtn.disabled = true;
      renderJob({
        stage: 'queued',
        message: '正在恢复最近任务状态',
        total_files: 0,
        processed_files: 0,
        success_count: 0,
        failure_count: 0,
        skipped_count: 0,
        total_rows: 0,
        current_file: '',
        errors: [],
      });
      pollJob(savedJobId);
    });
  </script>
</body>
</html>
